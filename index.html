<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Globe Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root { --blue-glow: #1a6fff; --bg-deep: #00000f; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-deep); overflow: hidden; width: 100vw; height: 100vh; font-family: 'Exo 2', sans-serif; cursor: grab; }
    body:active { cursor: grabbing; }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; }
    .halo { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 420px; height: 420px; border-radius: 50%; background: radial-gradient(circle, transparent 38%, rgba(30,80,255,0.18) 55%, transparent 72%); box-shadow: 0 0 80px 40px rgba(20,60,255,0.12), 0 0 200px 80px rgba(10,30,200,0.07); z-index: 2; pointer-events: none; animation: pulse 4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.7;transform:translate(-50%,-50%) scale(1)} 50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)} }
    .ui-overlay { position: fixed; top: 36px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; pointer-events: none; animation: fadeIn 1.5s ease forwards; }
    @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .title { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: clamp(1.4rem,5vw,2.6rem); color: #fff; letter-spacing: 0.12em; text-shadow: 0 0 20px rgba(100,160,255,0.8), 0 0 60px rgba(60,120,255,0.4); }
    .subtitle { margin-top: 6px; font-size: 0.78rem; font-weight: 300; color: rgba(160,200,255,0.6); letter-spacing: 0.2em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="ui-overlay">
    <h1 class="title">Globe Animation</h1>
    <p class="subtitle">Drag to rotate &bull; Scroll to zoom</p>
  </div>
  <div class="halo"></div>
  <canvas id="c"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 4.5;

    // Stars
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(3500 * 3);
    for (let i = 0; i < 3500*3; i++) pos[i] = (Math.random()-0.5)*400;
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.18 })));

    // Globe
    const loader = new THREE.TextureLoader();
    const globe = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 64, 64),
      new THREE.MeshPhongMaterial({
        map: loader.load('https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg'),
        bumpMap: loader.load('https://threejs.org/examples/textures/planets/earth_normal_2048.jpg'),
        bumpScale: 0.05, specular: new THREE.Color(0x334466), shininess: 18
      })
    );
    scene.add(globe);

    // Atmosphere
    const atm = new THREE.Mesh(new THREE.SphereGeometry(1.56,64,64), new THREE.MeshPhongMaterial({ color:0x1a4fff, transparent:true, opacity:0.10 }));
    scene.add(atm);
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.62,64,64), new THREE.MeshPhongMaterial({ color:0x0055ff, transparent:true, opacity:0.045, side:THREE.BackSide })));

    // Lights
    const sun = new THREE.DirectionalLight(0xffeedd, 1.2); sun.position.set(5,3,5); scene.add(sun);
    scene.add(new THREE.AmbientLight(0x112244, 0.6));
    const rim = new THREE.PointLight(0x2255ff, 1.5, 8); rim.position.set(-3,1,-2); scene.add(rim);

    // Drag
    let drag=false, px=0, py=0, vx=0, vy=0;
    canvas.addEventListener('mousedown', e=>{drag=true;px=e.clientX;py=e.clientY;vx=vy=0;});
    canvas.addEventListener('mousemove', e=>{ if(!drag)return; vx=(e.clientY-py)*0.005; vy=(e.clientX-px)*0.005; globe.rotation.x+=vx; globe.rotation.y+=vy; atm.rotation.x=globe.rotation.x; atm.rotation.y=globe.rotation.y; px=e.clientX;py=e.clientY; });
    canvas.addEventListener('mouseup', ()=>drag=false);
    canvas.addEventListener('touchstart', e=>{const t=e.touches[0];drag=true;px=t.clientX;py=t.clientY;},{passive:true});
    canvas.addEventListener('touchmove', e=>{const t=e.touches[0];if(!drag)return;vx=(t.clientY-py)*0.005;vy=(t.clientX-px)*0.005;globe.rotation.x+=vx;globe.rotation.y+=vy;atm.rotation.x=globe.rotation.x;atm.rotation.y=globe.rotation.y;px=t.clientX;py=t.clientY;},{passive:true});
    canvas.addEventListener('touchend', ()=>drag=false);
    canvas.addEventListener('wheel', e=>{ camera.position.z=Math.max(2.5,Math.min(8,camera.position.z+e.deltaY*0.005)); },{passive:true});

    window.addEventListener('resize', ()=>{ camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth,window.innerHeight); });

    function animate() {
      requestAnimationFrame(animate);
      if(!drag){ vx*=0.92;vy*=0.92;globe.rotation.x+=vx;globe.rotation.y+=vy;globe.rotation.y+=0.0018;atm.rotation.y=globe.rotation.y;atm.rotation.x=globe.rotation.x; }
      renderer.render(scene,camera);
    }
    animate();
  </script>
</body>
</html>
